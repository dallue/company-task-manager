<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>업무 관리</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<!-- 설정 화면 -->
<div id="setup-screen" class="setup-screen hidden">
  <div class="setup-box">
    <h2>초기 설정</h2>
    <p>GitHub 정보를 입력해주세요. 한 번만 입력하면 저장됩니다.</p>
    <label>GitHub PAT 토큰 *</label>
    <input type="password" id="setup-token" placeholder="ghp_xxxxxxxxxxxx">
    <label>Gist ID *</label>
    <input type="text" id="setup-gist" placeholder="3b62f1c184e665d934e29facbcceee45">
    <label>Groq API Key <span style="font-size:12px;color:#b2bec3">(AI 기능 사용 시 입력)</span></label>
    <input type="password" id="setup-claude" placeholder="gsk_...">
    <button onclick="saveSetup()">저장 및 시작</button>
    <p id="setup-error" class="error-msg"></p>
  </div>
</div>

<!-- 앱 메인 -->
<div id="app" class="hidden">

  <!-- 상단 헤더 -->
  <header class="header">
    <span id="header-title">대시보드</span>
    <div class="header-actions">
      <button class="icon-btn" onclick="showAddTask()" title="업무 추가">＋</button>
      <button class="icon-btn" onclick="openProjectModal()" title="프로젝트 관리">📁</button>
      <button class="icon-btn" onclick="syncData()" title="동기화">↻</button>
      <button class="icon-btn" onclick="logout()" title="설정">⚙</button>
    </div>
  </header>

  <!-- 프로젝트 필터 탭 -->
  <div id="project-filter-bar" class="project-filter-bar hidden">
    <div id="project-tabs" class="project-tabs"></div>
  </div>

  <!-- 메인 콘텐츠 -->
  <main class="main-content">

    <!-- 대시보드 -->
    <div id="page-dashboard" class="page">
      <div class="summary-cards">
        <div class="card card-blue"><div class="card-num" id="stat-total">0</div><div class="card-label">전체 업무</div></div>
        <div class="card card-yellow"><div class="card-num" id="stat-inprogress">0</div><div class="card-label">진행 중</div></div>
        <div class="card card-red"><div class="card-num" id="stat-delayed">0</div><div class="card-label">지연</div></div>
        <div class="card card-green"><div class="card-num" id="stat-done">0</div><div class="card-label">완료</div></div>
      </div>
      <div id="warnings-area"></div>
      <h3 class="section-title">오늘의 할 일</h3>
      <div id="today-todos"></div>
    </div>

    <!-- 일정표 -->
    <div id="page-calendar" class="page hidden">
      <div class="calendar-toggle">
        <button id="btn-monthly" class="toggle-btn active" onclick="switchCalendar('monthly')">월간</button>
        <button id="btn-weekly" class="toggle-btn" onclick="switchCalendar('weekly')">주간</button>
      </div>
      <div id="calendar-header" class="calendar-header">
        <button onclick="prevPeriod()">◀</button>
        <span id="calendar-title"></span>
        <button onclick="nextPeriod()">▶</button>
      </div>
      <div id="calendar-body"></div>
    </div>

    <!-- 업무 목록 -->
    <div id="page-tasks" class="page hidden">
      <div class="filter-bar">
        <select id="filter-priority" onchange="renderTaskList()">
          <option value="">전체 중요도</option>
          <option value="high">높음</option>
          <option value="medium">중간</option>
          <option value="low">낮음</option>
        </select>
        <select id="filter-status" onchange="renderTaskList()">
          <option value="">전체 상태</option>
          <option value="todo">시작 전</option>
          <option value="in-progress">진행 중</option>
        </select>
        <select id="filter-category" onchange="renderTaskList()">
          <option value="">전체 카테고리</option>
        </select>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- 완료 업무 -->
    <div id="page-completed" class="page hidden">
      <div id="completed-list"></div>
    </div>

    <!-- 빠른 메모 -->
    <div id="page-memo" class="page hidden">
      <div class="memo-input-area">
        <textarea id="memo-input" placeholder="생각나는 내용을 빠르게 메모하세요..." rows="4"></textarea>
        <div class="memo-actions-row">
          <button class="btn-primary" style="flex:1" onclick="addQuickMemo()">메모 저장</button>
          <button class="btn-ai" onclick="aiOrganizeMemos()">✨ AI 정리</button>
        </div>
      </div>
      <h3 class="section-title">메모 목록</h3>
      <div id="memo-list"></div>
    </div>

    <!-- 업무 통계 -->
    <div id="page-stats" class="page hidden">
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">전체 완료율</div><div class="stat-value" id="stats-rate">0%</div><div class="progress-bar"><div class="progress-fill" id="stats-rate-bar"></div></div></div>
        <div class="stat-box"><div class="stat-label">지연 업무</div><div class="stat-value red" id="stats-delayed">0건</div></div>
        <div class="stat-box"><div class="stat-label">이번 달 완료</div><div class="stat-value green" id="stats-month-done">0건</div></div>
        <div class="stat-box"><div class="stat-label">진행 중</div><div class="stat-value blue" id="stats-inprogress">0건</div></div>
      </div>
      <div class="ai-analysis-box">
        <div class="ai-btn-row">
          <button class="btn-ai" onclick="aiSummarizeProgress()">✨ AI 진행 요약</button>
          <button class="btn-secondary" onclick="generateAIText()">📋 Claude.ai 텍스트</button>
        </div>
        <div id="ai-summary-result" class="ai-result hidden"></div>
        <div id="ai-text-area" class="hidden">
          <textarea id="ai-text" rows="8" readonly></textarea>
          <button class="btn-secondary" onclick="copyAIText()">복사</button>
          <p id="copy-confirm" class="success-msg hidden">복사됐어요!</p>
        </div>
      </div>
      <h3 class="section-title">카테고리별 업무</h3>
      <div id="stats-category"></div>
      <h3 class="section-title">중요도별 현황</h3>
      <div id="stats-priority"></div>
    </div>

    <!-- 업무 상세 -->
    <div id="page-detail" class="page hidden">
      <div id="detail-content"></div>
    </div>

    <!-- 업무 등록/수정 -->
    <div id="page-form" class="page hidden">
      <form id="task-form" onsubmit="saveTask(event)">
        <input type="hidden" id="form-id">
        <input type="hidden" id="form-project-id">
        <div class="form-group">
          <label>프로젝트 *</label>
          <select id="form-project" required onchange="document.getElementById('form-project-id').value=this.value"></select>
        </div>
        <div class="form-group">
          <div class="form-label-row">
            <label>업무명 *</label>
            <button type="button" class="btn-ai-small" onclick="aiBreakdownTask()">✨ AI 세부업무 자동 생성</button>
          </div>
          <input type="text" id="form-title" required placeholder="업무명 입력">
        </div>
        <div class="form-group">
          <label>업무 내용</label>
          <textarea id="form-desc" rows="3" placeholder="상세 내용"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>카테고리</label>
            <input type="text" id="form-category" placeholder="예: 기획, 보고" list="category-list">
            <datalist id="category-list"></datalist>
          </div>
          <div class="form-group">
            <label>중요도 *</label>
            <div class="priority-row">
              <select id="form-priority" required>
                <option value="high">높음</option>
                <option value="medium" selected>중간</option>
                <option value="low">낮음</option>
              </select>
              <button type="button" class="btn-ai-small" onclick="aiSuggestPriority()">✨ AI 추천</button>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>마감일 *</label>
            <input type="date" id="form-due" required>
          </div>
          <div class="form-group">
            <label>예상 소요 시간 (h)</label>
            <input type="number" id="form-hours" min="0.5" step="0.5" placeholder="3">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>진행 상태</label>
            <select id="form-status">
              <option value="todo">시작 전</option>
              <option value="in-progress">진행 중</option>
              <option value="completed">완료</option>
            </select>
          </div>
          <div class="form-group">
            <label>진행률 (%)</label>
            <input type="number" id="form-progress" min="0" max="100" value="0">
          </div>
        </div>
        <div class="form-group">
          <label>메모</label>
          <textarea id="form-memo" rows="2" placeholder="업무 관련 메모"></textarea>
        </div>
        <h3 class="section-title">세부 업무</h3>
        <div id="subtask-list-form"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button type="button" class="btn-secondary" onclick="addSubtaskRow()">＋ 세부 업무 추가</button>
          <button type="button" class="btn-ai-small" onclick="aiSuggestSubtaskDates()">✨ AI 일정 추천</button>
          <button type="button" class="btn-secondary" onclick="distributeSubtaskDates()">📅 균등 배분</button>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="goBack()">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>

  </main>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="navigate('dashboard')" data-page="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
    <button class="nav-btn" onclick="navigate('calendar')" data-page="calendar"><span class="nav-icon">📅</span><span class="nav-label">일정표</span></button>
    <button class="nav-btn" onclick="navigate('tasks')" data-page="tasks"><span class="nav-icon">📋</span><span class="nav-label">업무</span></button>
    <button class="nav-btn" onclick="navigate('completed')" data-page="completed"><span class="nav-icon">✅</span><span class="nav-label">완료</span></button>
    <button class="nav-btn" onclick="navigate('memo')" data-page="memo"><span class="nav-icon">📝</span><span class="nav-label">메모</span></button>
    <button class="nav-btn" onclick="navigate('stats')" data-page="stats"><span class="nav-icon">📊</span><span class="nav-label">통계</span></button>
  </nav>

</div>

<!-- 프로젝트 관리 모달 -->
<div id="project-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>프로젝트 관리</h3>
      <button class="modal-close" onclick="closeProjectModal()">✕</button>
    </div>
    <div id="project-list-modal"></div>
    <div class="modal-add-row">
      <input type="text" id="new-project-name" placeholder="새 프로젝트명">
      <input type="color" id="new-project-color" value="#0984e3" style="width:40px;height:36px;border:none;cursor:pointer;border-radius:6px">
      <button class="btn-primary" onclick="addProject()">추가</button>
    </div>
  </div>
</div>

<!-- AI 결과 모달 -->
<div id="ai-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="ai-modal-title">AI 분석 결과</h3>
      <button class="modal-close" onclick="closeAiModal()">✕</button>
    </div>
    <div id="ai-modal-content" style="margin-bottom:16px"></div>
    <div id="ai-modal-actions" class="modal-actions"></div>
  </div>
</div>

<!-- 임시 저장 동기화 배너 -->
<div id="pending-banner" class="pending-banner hidden">
  <span>⚠️ 동기화 안 된 데이터가 있어요</span>
  <button onclick="syncPendingData()">지금 동기화</button>
  <button onclick="clearPendingDb()">무시</button>
</div>

<!-- 토스트 알림 -->
<div id="toast" class="toast hidden"></div>

<script src="app.js?v=10"></script>
</body>
</html>
